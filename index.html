<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Amigo PET</title>
</head>

<body>
    <header class="topo">
        <div class="logo">
            <img src="imgs/LOGO-AMIGO-PET.png" alt="LOGO" class="img-logo">
            <h1>Amigo Pet</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#inicio">Início</a></li>
                <li><a href="#servicos">Serviços</a></li>
                <li><a href="#agendar">Agendar</a></li>
                <li><a href="#contatos">Contatos</a></li>
                <li><a href="#fotos">Fotos</a></li>
            </ul>
        </nav>
    </header>

    <section id="inicio">
        <div class="texto-inicio">
            <h2>Cuidando do seu melhor amigo com amor e carinho</h2>

            <p>oferecemos os melhores serviços e produtos para o bem-estar do seu pet</p>
            <div class="botoes">
                <button class="btn-agendar">Agendar Agora</button>
                <button class="btn-servicos">Nossos Serviços</button>
            </div>
        </div>

        <div class="imagem-inicio">
            <img src="imgs/imagemIG.png" alt="cachorro">
        </div>

    </section>


</body>

</html>
